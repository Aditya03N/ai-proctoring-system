<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ProctorX | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="login-wrapper">
        <div class="login-card glass-panel">
            <div class="brand-icon">
                <i class="fas fa-shield-virus"></i>
            </div>
            
            <h1 class="text-gradient" style="margin-bottom: 5px;">AI ProctorX</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; letter-spacing: 1px;">AI-Powered Examination Monitoring System</p>

            {% if error %}
            <div class="alert-error">
                <i class="fas fa-exclamation-triangle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form id="loginForm" method="POST" action="/login">
                <div class="input-wrapper">
                    <label for="candidate_id">Candidate ID</label>
                    <input type="text" id="candidate_id" name="candidate_id" placeholder="e.g. AIML001" required autocomplete="off">
                    <i class="fas fa-user-astronaut icon-left"></i>
                </div>

                <div class="input-wrapper">
                    <label for="password">Security Key</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <i class="fas fa-fingerprint icon-left"></i>
                    <button type="button" id="togglePassword" style="position: absolute; right: 16px; top: 38px; background: none; border: none; color: var(--text-muted); cursor: pointer; transition: color 0.3s;">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <button type="submit" class="btn-glow" id="loginBtn" style="width: 100%; margin-top: 10px;">
                    Initialize Session <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            
            <div style="margin-top: 30px; font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 8px;">
                <i class="fas fa-lock" style="color: var(--success);"></i>
                <span>End-to-End Encrypted Gateway</span>
            </div>
        </div>
    </div>

    <!-- Futuristic Loading Overlay -->
    <div class="futuristic-loader" id="loadingOverlay">
        <div class="scanner"></div>
        <h2 class="orbitron text-gradient">AUTHENTICATING</h2>
        <p style="color: var(--primary); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; margin-top: 10px; animation: blink 1s infinite;">establishing secure link...</p>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
