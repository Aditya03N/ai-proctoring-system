<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ProctorX | Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="animated-bg"></div>
    <div class="login-wrapper">
        <div class="login-card glass-panel">
            <div class="brand-icon">
                <i class="fas fa-shield-virus"></i>
            </div>
            <h1 class="text-gradient" style="margin-bottom: 6px;">AI ProctorX</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; letter-spacing: 1px;">Admin access to the AI exam monitoring dashboard</p>

            {% if error %}
            <div class="alert-error">
                <i class="fas fa-exclamation-triangle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form id="loginForm" method="POST" action="/admin">
                <div class="input-wrapper">
                    <label for="username">Admin Username</label>
                    <input type="text" id="username" name="username" placeholder="admin" required autocomplete="off">
                    <i class="fas fa-user-shield icon-left"></i>
                </div>
                <div class="input-wrapper" style="margin-bottom: 18px;">
                    <label for="password">Access Key</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <i class="fas fa-lock icon-left"></i>
                    <button type="button" id="togglePassword" style="position: absolute; right: 16px; top: 38px; background: none; border: none; color: var(--text-muted); cursor: pointer; transition: color 0.3s;">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <button type="submit" class="btn-glow" id="loginBtn" style="width: 100%; margin-top: 10px;">
                    Enter Control Grid <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div style="margin-top: 30px; font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 8px;">
                <i class="fas fa-lock" style="color: var(--success);"></i>
                <span>Secure admin session</span>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
