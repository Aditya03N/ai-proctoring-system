<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Portal - AI Proctoring</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>

<body class="exam-page">

    <div class="exam-container">

        <div class="video-section">
            <h2>Live Monitoring</h2>
            <div class="webcam-box">
                <video id="video" autoplay playsinline></video>
                <div class="status-overlay">LIVE MONITORING</div>
            </div>

            <div class="status-box">
                <p>Status: <span id="statusText" class="green">Monitoring Active</span></p>
                <p>Warnings: <span id="warningCount">0</span></p>
            </div>
        </div>

        <div class="side-panel">
            <div class="timer-box">
                <h3>Exam Timer</h3>
                <h1 id="timer">60:00</h1>
            </div>

            <div class="alert-box">
                <h3>AI Alerts</h3>
                <div id="logs" class="logs-list">
                    <p class="log-info">Connecting to AI Server...</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Socket.IO for Server-Side AI -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <!-- Main Logic -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
